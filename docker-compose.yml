services:

  # ── Autonomous agent ──────────────────────────────────────────────────────
  agent:
    build:
      context: .
      target: runtime
    image: claw-linux:latest
    container_name: claw-agent
    restart: unless-stopped
    environment:
      CLAW_MODE: agent
      OPENCLAW_MODEL_PROVIDER: ollama
      OPENCLAW_MODEL_NAME: llama3.2
      OPENCLAW_OLLAMA_HOST: http://ollama:11434
      OPENCLAW_AGENT_NAME: Claw
      OPENCLAW_LOG_LEVEL: INFO
    volumes:
      - claw-memory:/var/lib/claw/memory
      - claw-workspace:/workspace
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - claw-net

  # ── Native HTTP gateway (control plane) ───────────────────────────────────
  gateway:
    build:
      context: .
      target: runtime
    image: claw-linux:latest
    container_name: claw-gateway
    restart: unless-stopped
    environment:
      CLAW_MODE: gateway
      CLAW_GATEWAY_PORT: "18789"
      CLAW_GATEWAY_BIND: "0.0.0.0"
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - claw-ipc:/var/lib/claw
    networks:
      - claw-net
    profiles:
      - gateway

  # ── Channel webhook adapter ───────────────────────────────────────────────
  channel:
    build:
      context: .
      target: runtime
    image: claw-linux:latest
    container_name: claw-channel
    restart: unless-stopped
    environment:
      CLAW_MODE: channel
      CLAW_CHANNEL_PORT: "18790"
      CLAW_CHANNEL_BIND: "0.0.0.0"
      CLAW_GATEWAY_URL: "http://gateway:18789/api/event"
      CLAW_CHANNEL_SECRET: ""        # set to a shared secret in production
      CLAW_TELEGRAM_TOKEN: ""        # set your Telegram bot token
    ports:
      - "127.0.0.1:18790:18790"
    networks:
      - claw-net
    depends_on:
      - gateway
    profiles:
      - gateway

  # ── Cron automation scheduler ─────────────────────────────────────────────
  cron:
    build:
      context: .
      target: runtime
    image: claw-linux:latest
    container_name: claw-cron
    restart: unless-stopped
    environment:
      CLAW_MODE: cron
      CLAW_CRONTAB: /opt/claw/config/crontab
      CLAW_CRON_LOG: "-"
    volumes:
      - claw-memory:/var/lib/claw/memory
      - claw-workspace:/workspace
    networks:
      - claw-net
    profiles:
      - automation

  # ── Agent REST API (optional) ─────────────────────────────────────────────
  agent-api:
    build:
      context: .
      target: runtime
    image: claw-linux:latest
    container_name: claw-api
    restart: unless-stopped
    environment:
      CLAW_MODE: api
      OPENCLAW_MODEL_PROVIDER: ollama
      OPENCLAW_MODEL_NAME: llama3.2
      OPENCLAW_OLLAMA_HOST: http://ollama:11434
      OPENCLAW_AGENT_NAME: Claw
      OPENCLAW_LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - claw-memory:/var/lib/claw/memory
      - claw-workspace:/workspace
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - claw-net
    profiles:
      - api

  # ── Ollama local LLM server ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: claw-ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - claw-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  claw-memory:
  claw-workspace:
  claw-ipc:
  ollama-models:

networks:
  claw-net:
    driver: bridge
